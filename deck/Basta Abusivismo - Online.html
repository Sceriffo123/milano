document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"3d1e6d8b-c40c-4e96-b359-9e65fd560a43\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Archivo';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"90a37d6b-f7fb-498e-9216-12a67b747a50\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Archivo';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"ee010a20-b696-4b41-a6e4-bc6f8754623d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"3d1e6d8b-c40c-4e96-b359-9e65fd560a43\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Archivo Black';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f56363b4-2782-41d1-8361-28d035b3a082\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo Black';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f6d0caf9-cb25-4e42-b23a-c387c5dcf2fa\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   URITAXI · FILT CGIL — COLORI\n   Palette ufficiale del volantino. NON introdurre altri colori brand.\n   nero profondo · rosso taxi · panna · bianco\n   ============================================================ */\n:root {\n  /* --- Palette base (immutabile) --- */\n  --nero: #1A1A1A;     /* dominante: scene scure, testo su chiaro */\n  --rosso: #C8102E;    /* accento unico: barre, numeri, chip, band */\n  --panna: #F7F5F2;    /* scene chiare, testo su scuro */\n  --bianco: #FFFFFF;   /* superfici card su scene chiare */\n\n  /* --- Neutri di servizio (derivati, non brand) --- */\n  --grigio: #6B6B6B;          /* testo secondario su chiaro */\n  --grigio-su-scuro: #B9B4AC; /* testo secondario su scuro */\n  --carta-scura: #232323;     /* card su scene scure */\n  --rosso-scuro: #7D0A1D;     /* bordo/ombra del rosso, stati attivi */\n  --linea: rgba(0,0,0,.12);   /* divisori su chiaro */\n  --linea-scura: rgba(255,255,255,.14); /* divisori su scuro */\n\n  /* --- Alias semantici --- */\n  --surface-dark: var(--nero);\n  --surface-light: var(--panna);\n  --surface-card: var(--bianco);\n  --surface-card-dark: var(--carta-scura);\n  --accent: var(--rosso);\n  --accent-strong: var(--rosso-scuro);\n\n  --text-on-light: var(--nero);\n  --text-on-dark: var(--panna);\n  --text-muted-light: var(--grigio);\n  --text-muted-dark: var(--grigio-su-scuro);\n  --text-accent: var(--rosso);\n\n  --border-accent: var(--rosso);\n  --hairline: var(--linea);\n  --hairline-dark: var(--linea-scura);\n}\n\n/* ============================================================\n   URITAXI · FILT CGIL — TIPOGRAFIA\n   Titoli in sans pesantissimo (Archivo Black / Arial Black).\n   Corpo in sans pulito (Archivo / Helvetica Neue).\n   Titoli grandi 40pt+, poco testo per scena.\n   ============================================================ */\n:root {\n  /* --- Famiglie --- */\n  --font-heavy: \"Archivo Black\", \"Arial Black\", Impact, Arial, sans-serif;\n  --font-body: \"Archivo\", \"Helvetica Neue\", Arial, system-ui, sans-serif;\n\n  /* --- Pesi --- */\n  --weight-body: 400;\n  --weight-medium: 500;\n  --weight-bold: 700;\n  --weight-heavy: 900;\n\n  /* --- Tracciatura --- */\n  --track-heavy: -0.01em;   /* titoli pesantissimi, leggermente serrati */\n  --track-normal: 0; /* @kind font */\n  --track-kicker: 0.18em;   /* occhielli / kicker maiuscoli */\n  --track-chip: 0.12em;     /* chip / etichette */\n  --track-wide: 0.08em;     /* intestazioni tabella */\n\n  /* --- Interlinea --- */\n  --leading-giant: 0.85;\n  --leading-display: 0.95;\n  --leading-title: 1.0;\n  --leading-lead: 1.25;\n  --leading-body: 1.45;\n\n  /* --- Scala tipografica (responsive, ottimizzata per proiezione 16:9) --- */\n  --fs-giant: clamp(90px, 22vw, 300px);   /* @kind font */ /* numeri giganti / anni */\n  --fs-display: clamp(40px, 9vw, 128px);  /* @kind font */ /* H1 manifesto */\n  --fs-h1: clamp(34px, 7vw, 96px);        /* @kind font */\n  --fs-h2: clamp(30px, 5.4vw, 72px);      /* @kind font */\n  --fs-counter: clamp(52px, 9vw, 120px);  /* @kind font */ /* contatori */\n  --fs-lead: clamp(17px, 2.3vw, 30px);    /* @kind font */ /* sommario */\n  --fs-sub: clamp(15px, 1.8vw, 24px);     /* @kind font */ /* servizio */\n  --fs-body: clamp(15px, 1.7vw, 20px);    /* @kind font */\n  --fs-kicker: clamp(11px, 1.4vw, 16px);  /* @kind font */\n  --fs-chip: clamp(11px, 1.4vw, 15px);    /* @kind font */\n  --fs-fine: clamp(10px, 1.3vw, 14px);    /* @kind font */ /* stripe / crediti */\n}\n\n/* ============================================================\n   URITAXI · FILT CGIL — SPAZIO, BORDI, OMBRE, MOTIVI\n   La barra verticale rossa, il raggio minimo, l'ombra solenne.\n   ============================================================ */\n:root {\n  /* --- Spaziatura (scala a passo 4/8) --- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n\n  /* --- Padding di scena (proiezione) --- */\n  --scene-pad-y: 6vh;\n  --scene-pad-x: 8vw;\n\n  /* --- Gutter griglie --- */\n  --gap-grid: 1.6vw;\n  --gap-grid-wide: 2.4vw;\n\n  /* --- Raggi (minimi, istituzionali: niente angoli morbidi) --- */\n  --radius-chip: 3px;\n  --radius-card: 4px;\n  --radius-pill: 20px;\n  --radius-none: 0;\n\n  /* --- Barra verticale rossa (motivo cardine) --- */\n  --bar-width: 8px;            /* barra a sinistra delle card */\n  --bar-top-width: 6px;        /* barra superiore dei blocchi flow */\n\n  /* --- Ombre (solenni, profonde) --- */\n  --shadow-card: 0 18px 50px rgba(0,0,0,.18);\n  --shadow-soft: 0 8px 24px rgba(0,0,0,.12);\n\n  /* --- Tempi d'animazione (ritmo solenne) --- */\n  --t-reveal: .7s;            /* @kind other */ /* ingresso elementi */\n  --t-scene: .55s;            /* @kind other */ /* dissolvenza tra scene */\n  --t-stagger: .18s;          /* @kind other */ /* sfasamento progressivo */\n  --ease-solenne: cubic-bezier(.22, .61, .36, 1); /* @kind other */\n}\n\n/* ============================================================\n   URITAXI · FILT CGIL — BASE & MOTIVI\n   Reset leggero, default tipografici, classi-motivo riusabili\n   (heavy, kicker, chip, card con barra rossa, band, numeri giganti).\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  font-family: var(--font-body);\n  font-weight: var(--weight-body);\n  color: var(--text-on-light);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* --- Titolo pesantissimo (motivo cardine) --- */\n.heavy {\n  font-family: var(--font-heavy);\n  font-weight: var(--weight-heavy);\n  letter-spacing: var(--track-heavy);\n  line-height: var(--leading-display);\n}\n\n/* --- Occhiello / kicker --- */\n.kicker {\n  color: var(--text-accent);\n  font-weight: var(--weight-bold);\n  letter-spacing: var(--track-kicker);\n  text-transform: uppercase;\n  font-size: var(--fs-kicker);\n}\n\n/* --- Numero gigante rosso --- */\n.num-giant {\n  font-family: var(--font-heavy);\n  font-weight: var(--weight-heavy);\n  color: var(--rosso);\n  font-size: var(--fs-giant);\n  line-height: var(--leading-giant);\n  letter-spacing: var(--track-heavy);\n}\n\n/* --- Superfici scena --- */\n.surface-dark  { background: var(--surface-dark);  color: var(--text-on-dark); }\n.surface-light { background: var(--surface-light); color: var(--text-on-light); }\n\n/* --- Testo di servizio --- */\n.lead { font-size: var(--fs-lead); line-height: var(--leading-lead); max-width: 24ch; }\n.sub  { font-size: var(--fs-sub);  color: var(--text-muted-light); max-width: 34ch; line-height: var(--leading-lead); }\n.surface-dark .sub { color: var(--text-muted-dark); }\n.corsivo { font-style: italic; }\n\n/* --- Accessibilità: rispetta la riduzione del movimento --- */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation: none !important; transition-duration: .01ms !important; }\n}\n\n<\u002Fstyle>\n<style>/* ============================================================\n   BASTA ABUSIVISMO — versione cinematografica\n   Palette tri-sindacale (deck-locale, non tocca i token di marca):\n   blu URITAXI · rosso FILT CGIL · verde UGL. Fondi scuri premium,\n   gradienti, grana, vignette. Tipografia pesantissima di sistema.\n   ============================================================ */\n\n:root {\n  /* fondali cinematografici — deep navy URITAXI */\n  --bg-0: #0A0F1A;        /* navy profondo (eco del wordmark uritaxi #08091D) */\n  --bg-1: #0E1524;\n  --bg-2: #131C2E;\n  --panna: #F4F1EA;       /* scene chiare */\n  --panna-2: #E9E4D9;\n\n  /* colori di marca campionati dai loghi reali */\n  --blu: #1E6FC2;         /* URITAXI — azzurro primario */\n  --blu-deep: #102A43;    /* URITAXI — navy del wordmark */\n  --blu-soft: #5AA8EE;    /* accento/bagliore su scuro */\n  --rosso: #D81528;       /* FILT CGIL — rosso (camp. #D11628 / #EC0004) */\n  --rosso-deep: #8E0C18;\n  --rosso-soft: #FF4F5F;\n  --verde: #30AD2F;       /* URITAXI — verde del logo */\n  --verde-deep: #1E7A1D;\n  --verde-soft: #62D45F;\n\n  /* neutri su scuro */\n  --ink: #F4F1EA;\n  --ink-dim: #A9B0BD;\n  --ink-faint: #6B7480;\n  --line: rgba(255,255,255,.10);\n  --line-strong: rgba(255,255,255,.18);\n\n  /* gradiente \"fronte comune\" */\n  --fronte: linear-gradient(90deg, var(--blu) 0%, var(--rosso) 52%, var(--verde) 100%);\n  --fronte-soft: linear-gradient(90deg, var(--blu-soft), var(--rosso-soft) 52%, var(--verde-soft));\n\n  --shadow-cine: 0 40px 120px rgba(0,0,0,.55);\n  --glass: rgba(255,255,255,.045);\n  --glass-line: rgba(255,255,255,.12);\n}\n\n/* ---------- shell ---------- */\ndeck-stage:not(:defined) { visibility: hidden; }\nhtml, body { margin: 0; background: #000; }\nbody { font-family: var(--font-body, \"Archivo\",\"Helvetica Neue\",Arial,sans-serif); }\n.heavy { font-family: var(--font-heavy, \"Archivo Black\",\"Arial Black\",Impact,sans-serif); font-weight: 900; letter-spacing: -.015em; }\n\n/* ogni slide riempie il canvas 1920×1080 */\n.s {\n  position: absolute; inset: 0; overflow: hidden;\n  color: var(--ink);\n  display: flex; flex-direction: column; justify-content: center;\n  padding: 110px 152px;\n  background: var(--bg-0);\n}\n.s.light { background: var(--panna); color: #14171C; }\n\n/* strato di fondo: gradiente d'atmosfera */\n.s::before {\n  content: \"\"; position: absolute; inset: 0; z-index: 0; pointer-events: none;\n  background:\n    radial-gradient(120% 90% at 12% 8%, rgba(30,111,194,.16), transparent 55%),\n    radial-gradient(120% 90% at 92% 96%, rgba(216,21,40,.14), transparent 55%);\n}\n.s.light::before {\n  background:\n    radial-gradient(110% 80% at 100% 0%, rgba(30,111,194,.10), transparent 60%),\n    radial-gradient(90% 80% at 0% 100%, rgba(216,21,40,.06), transparent 60%);\n}\n/* grana cinematografica */\n.s::after {\n  content: \"\"; position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: .5;\n  background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/><\u002Ffilter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/><\u002Fsvg>\");\n  mix-blend-mode: overlay;\n}\n.s > * { position: relative; z-index: 2; }\n\n/* vignette per le scene piene d'immagine */\n.s.cine > .vignette {\n  position: absolute; inset: 0; z-index: 1; pointer-events: none;\n  background:\n    linear-gradient(180deg, rgba(7,9,15,.30) 0%, rgba(7,9,15,.08) 32%, rgba(7,9,15,.62) 78%, rgba(7,9,15,.92) 100%),\n    radial-gradient(120% 120% at 50% 40%, transparent 50%, rgba(0,0,0,.55) 100%);\n}\n\n/* ---------- full-bleed image slot ---------- */\n.fullbleed { position: absolute; inset: 0; z-index: 0; }\n.fullbleed image-slot { position: absolute; inset: 0; width: 100%; height: 100%; }\n.duotone { filter: saturate(.55) contrast(1.08) brightness(.82); }\n\n/* ---------- signature: barra fronte comune ---------- */\n.frontbar { height: 8px; width: 220px; border-radius: 99px; background: var(--fronte); box-shadow: 0 0 28px rgba(216,21,40,.35); }\n.frontbar.full { width: 100%; }\n.rule { height: 1px; background: var(--line-strong); border: 0; width: 100%; }\n\n/* ---------- tipografia ---------- */\n.eyebrow {\n  display: inline-flex; align-items: center; gap: 14px;\n  font-weight: 700; letter-spacing: .26em; text-transform: uppercase; font-size: 19px; color: var(--ink-dim);\n}\n.eyebrow .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rosso); box-shadow: 0 0 14px var(--rosso); }\n.s.light .eyebrow { color: #6a6a6a; }\n\n.display { font-size: 168px; line-height: .9; margin: 0; }\n.h1 { font-size: 116px; line-height: .92; margin: 0; }\n.h2 { font-size: 78px; line-height: .96; margin: 0; }\n.lead { font-size: 38px; line-height: 1.28; max-width: 24ch; color: var(--ink); font-weight: 500; }\n.s.light .lead { color: #23262C; }\n.sub { font-size: 27px; line-height: 1.4; color: var(--ink-dim); max-width: 40ch; }\n.s.light .sub { color: #555; }\n.korsiv { font-style: italic; }\n\n.grad { background: var(--fronte-soft); -webkit-background-clip: text; background-clip: text; color: transparent; }\n.c-blu { color: var(--blu-soft); }\n.c-rosso { color: var(--rosso-soft); }\n.c-verde { color: var(--verde-soft); }\n.s.light .c-blu { color: var(--blu-deep); }\n.s.light .c-rosso { color: var(--rosso-deep); }\n.s.light .c-verde { color: var(--verde-deep); }\n\n/* numero gigante con bagliore */\n.giant { font-size: 264px; line-height: .82; letter-spacing: -.02em; }\n.giant.rosso { color: var(--rosso); text-shadow: 0 0 80px rgba(216,21,40,.45); }\n.giant.blu { color: var(--blu); text-shadow: 0 0 80px rgba(30,111,194,.45); }\n.giant.ghost { color: transparent; -webkit-text-stroke: 2px var(--line-strong); }\n\n/* ---------- chip & badge ---------- */\n.chip { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; font-size: 18px; padding: 12px 20px; border-radius: 6px; }\n.chip.solid { background: var(--rosso); color: #fff; box-shadow: 0 10px 30px rgba(216,21,40,.35); }\n.chip.line { border: 1.5px solid var(--line-strong); color: var(--ink-dim); }\n\n/* ---------- cards ---------- */\n.cards { display: grid; gap: 26px; }\n.glass {\n  position: relative; background: var(--glass); border: 1px solid var(--glass-line);\n  border-radius: 16px; padding: 34px 36px; backdrop-filter: blur(8px);\n  box-shadow: inset 0 1px 0 rgba(255,255,255,.06);\n}\n.glass .ttl { font-size: 30px; font-weight: 800; margin: 0 0 10px; letter-spacing: -.01em; }\n.glass p { margin: 0; font-size: 23px; line-height: 1.42; color: var(--ink-dim); }\n.glass .tag { font-size: 16px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }\n/* barra-accento a sinistra, colore per sigla */\n.glass.bar { padding-left: 40px; }\n.glass.bar::before { content: \"\"; position: absolute; left: 0; top: 16px; bottom: 16px; width: 5px; border-radius: 99px; background: var(--rosso); }\n.glass.blu::before { background: var(--blu); }\n.glass.verde::before { background: var(--verde); }\n.glass.bar.blu .tag { color: var(--blu-soft); }\n.glass.bar .tag { color: var(--rosso-soft); }\n.glass.bar.verde .tag { color: var(--verde-soft); }\n\n.s.light .glass { background: rgba(20,23,28,.03); border-color: rgba(20,23,28,.10); backdrop-filter: none; }\n.s.light .glass p { color: #4a4d53; }\n\n/* banda affermazione */\n.band { background: var(--rosso); color: #fff; padding: 24px 32px; border-radius: 12px; font-weight: 700; font-size: 27px; line-height: 1.36; box-shadow: 0 24px 60px rgba(216,21,40,.28); }\n.band.fronte { background: var(--fronte); }\n\n/* ---------- stats ---------- */\n.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; }\n.stat .num { font-size: 132px; line-height: .86; letter-spacing: -.02em; }\n.stat .lab { font-size: 21px; color: var(--ink-dim); margin-top: 14px; max-width: 16ch; line-height: 1.3; }\n.s.light .stat .lab { color: #555; }\n\n/* ---------- macchina (flow) ---------- */\n.flow { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }\n.flow .step { position: relative; background: var(--glass); border: 1px solid var(--glass-line); border-radius: 14px; padding: 30px 24px; overflow: hidden; }\n.flow .step .n { font-size: 64px; line-height: 1; color: var(--blu-soft); }\n.flow .step .t { font-weight: 800; letter-spacing: .06em; margin-top: 12px; font-size: 23px; }\n.flow .step small { color: var(--ink-faint); font-size: 18px; }\n.flow .step.last { background: linear-gradient(160deg, var(--rosso), var(--rosso-deep)); border-color: transparent; box-shadow: 0 24px 60px rgba(216,21,40,.30); }\n.flow .step.last .n, .flow .step.last small { color: rgba(255,255,255,.92); }\n.flow .step .arrow { position: absolute; right: -10px; top: 50%; color: var(--ink-faint); font-size: 30px; }\n\n/* ---------- due mondi (split) ---------- */\n.split { display: grid; grid-template-columns: 1fr 1fr; gap: 0; align-items: stretch; height: 100%; }\n.world { display: flex; flex-direction: column; justify-content: center; gap: 22px; padding: 0 64px; }\n.world.law { border-right: 1px solid var(--line-strong); }\n.world .wk { font-weight: 800; letter-spacing: .2em; text-transform: uppercase; font-size: 20px; }\n.world.law .wk { color: var(--blu-soft); }\n.world.pol .wk { color: var(--ink-dim); }\n.world h3 { font-size: 56px; line-height: .98; margin: 0; }\n.world li { font-size: 24px; color: var(--ink-dim); line-height: 1.4; margin: 0; }\n.ring { width: 132px; height: 132px; border-radius: 50%; border: 6px solid var(--blu); box-shadow: 0 0 50px rgba(30,111,194,.4), inset 0 0 30px rgba(30,111,194,.25); }\n.wobble { width: 240px; height: 60px; }\n\n/* ---------- domino ---------- */\n.domino { display: flex; align-items: flex-end; gap: 18px; height: 360px; }\n.tile {\n  width: 64px; height: 230px; border-radius: 10px; transform-origin: bottom left;\n  background: linear-gradient(180deg, #1a212d, #0e131b); border: 1px solid var(--line-strong);\n  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 14px; box-shadow: var(--shadow-cine);\n  color: var(--ink-dim); font-size: 14px; font-weight: 700;\n}\n.tile span { writing-mode: vertical-rl; transform: rotate(180deg); letter-spacing: .04em; }\n.tile.hot { background: linear-gradient(180deg, var(--rosso), var(--rosso-deep)); border-color: transparent; color: #fff; }\n\n/* ---------- speaker hint stripe ---------- */\n.foot { position: absolute; left: 152px; right: 152px; bottom: 64px; display: flex; align-items: center; gap: 22px; z-index: 3; }\n.foot .logos { font-weight: 900; letter-spacing: .04em; font-size: 19px; }\n.foot .logos .u { color: var(--blu-soft); } .foot .logos .f { color: var(--rosso-soft); } .foot .logos .g { color: var(--verde-soft); }\n.foot .meta { color: var(--ink-faint); font-size: 18px; }\n\n/* ============================================================\n   ANIMAZIONI — stato finale visibile come base; si anima DA nascosto\n   solo quando la slide è attiva e il movimento è consentito.\n   ============================================================ */\n.reveal { opacity: 1; transform: none; }\n.reveal-x { opacity: 1; transform: none; }\n.grow { transform: none; }\n\n@media (prefers-reduced-motion: no-preference) {\n  [data-deck-active] .reveal { animation: cineRise .9s cubic-bezier(.16,.7,.24,1) both; animation-delay: var(--d, 0s); }\n  [data-deck-active] .reveal-x { animation: cineSlide 1s cubic-bezier(.16,.7,.24,1) both; animation-delay: var(--d, 0s); }\n  [data-deck-active] .kenburns { animation: ken 14s ease-out both; }\n  [data-deck-active] .grow { animation: cineGrow 1.1s cubic-bezier(.16,.7,.24,1) both; animation-delay: var(--d, 0s); }\n  [data-deck-active] .tile.fall { animation: dominoFall .55s cubic-bezier(.6,.04,.98,.34) forwards; animation-delay: var(--fd, 0s); }\n  [data-deck-active] .pulse { animation: pulse 2.6s ease-in-out infinite; }\n}\n@keyframes cineRise { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: none; } }\n@keyframes cineSlide { from { opacity: 0; transform: translateX(-48px); } to { opacity: 1; transform: none; } }\n@keyframes cineGrow { from { opacity: 0; transform: scale(.86); } to { opacity: 1; transform: scale(1); } }\n@keyframes ken { from { transform: scale(1.12); } to { transform: scale(1); } }\n@keyframes dominoFall { to { transform: rotate(82deg); } }\n@keyframes pulse { 0%,100% { box-shadow: 0 0 50px rgba(30,111,194,.4), inset 0 0 30px rgba(30,111,194,.25); } 50% { box-shadow: 0 0 78px rgba(30,111,194,.7), inset 0 0 38px rgba(30,111,194,.35); } }\n\n/* utilità layout */\n.col { display: flex; flex-direction: column; }\n.row { display: flex; }\n.gap-s { gap: 14px; } .gap-m { gap: 26px; } .gap-l { gap: 44px; }\n.mt-s { margin-top: 18px; } .mt-m { margin-top: 34px; } .mt-l { margin-top: 56px; }\n.center { align-items: center; text-align: center; justify-content: center; }\n.spread { justify-content: space-between; }\n.aend { align-items: flex-end; }\n.astart { align-items: flex-start; }\n.fill { flex: 1; }\n.wide { max-width: none; }\n\n/* ---------- targhe logo (loghi a colori su fondo scuro) ---------- */\n.logostrip { display: flex; align-items: center; gap: 18px; }\n.logoplate { background: #fff; border-radius: 12px; padding: 12px 16px; display: inline-flex; align-items: center; box-shadow: 0 12px 34px rgba(0,0,0,.35); }\n.logoplate img { display: block; height: 56px; width: auto; }\n.logoplate.lg img { height: 96px; }\n.logoplate.sm img { height: 40px; }\n\n/* ---------- registro casi \"a scendere\" ---------- */\n.casi-grid { columns: 3; column-gap: 36px; }\n.caso { break-inside: avoid; display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--line); }\n.caso .nm { flex: 1; font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.caso .pv { color: var(--ink-faint); font-size: 13px; font-weight: 700; }\n.badge { font-size: 10px; font-weight: 800; letter-spacing: .06em; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; white-space: nowrap; }\n.badge.def { background: var(--rosso); color: #fff; box-shadow: 0 0 16px rgba(216,21,40,.4); }\n.badge.cor { background: rgba(255,255,255,.06); color: var(--ink-dim); border: 1px solid var(--line-strong); }\n.logoplate.dark img { mix-blend-mode: normal; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- 01 · COLD OPEN -->\n  <section class=\"s cine\" data-label=\"Apertura\">\n    <div class=\"fullbleed\"><image-slot id=\"cine-hero\" class=\"duotone kenburns\" placeholder=\"Foto a tutto schermo: taxi nella città di notte / fila di taxi a Milano\" fit=\"cover\"><\u002Fimage-slot><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"col gap-m\">\n      <div class=\"eyebrow reveal\"><span class=\"dot\"><\u002Fspan> Milano · 10 giugno 2026 · ore 14:00 · Spazio Kolbe — Viale Corsica 68<\u002Fdiv>\n      <h1 class=\"heavy display reveal\" style=\"--d:.08s\">BASTA<br>ABUSIVISMO<\u002Fh1>\n      <div class=\"frontbar reveal\" style=\"--d:.2s\"><\u002Fdiv>\n      <p class=\"lead reveal\" style=\"--d:.28s\">Quindici anni di attività, dieci di metodo Firenze:<br>atti e risultati verificabili.<\u002Fp>\n      <div class=\"reveal\" style=\"--d:.34s\">\n        <div style=\"font-weight:700; letter-spacing:.22em; text-transform:uppercase; font-size:14px; color:var(--ink-faint); margin-bottom:6px\">Relatori<\u002Fdiv>\n        <div style=\"font-size:23px; font-weight:600; color:var(--ink)\">Claudio Giudici · Alessandro Genovese · Marco Morana · Lapo Lemmi<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\">\n      <span class=\"logostrip reveal\" style=\"--d:.4s\">\n        <span class=\"logoplate sm\"><img src=\"5caa17af-9c4f-4c7a-b28d-2f902692bdaa\" alt=\"URITAXI\"><\u002Fspan>\n        <span class=\"logoplate sm\"><img src=\"c08ca18a-9bc6-406d-b271-b032c0f7a639\" alt=\"FILT-CGIL Taxi\"><\u002Fspan>\n      <\u002Fspan>\n      <span class=\"frontbar\"><\u002Fspan>\n      <span class=\"fill\"><\u002Fspan>\n      <span class=\"meta\">Contrasto all'abusivismo nel trasporto pubblico non di linea<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 · 2011 → 2013 -->\n  <section class=\"s\" data-label=\"2011 → 2013\">\n    <div class=\"eyebrow reveal\"><span class=\"dot\"><\u002Fspan> Dove tutto è cominciato<\u002Fdiv>\n    <div class=\"row gap-l mt-s astart\" style=\"align-items:flex-end\">\n      <div class=\"heavy reveal\" style=\"--d:.05s; font-size:150px; line-height:.82; color:transparent; -webkit-text-stroke:2px var(--line-strong)\">2011<\u002Fdiv>\n      <div class=\"heavy h2 c-rosso grow\" style=\"--d:.18s; padding-bottom:14px\">→ 2013<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cards mt-m reveal\" style=\"--d:.24s; grid-template-columns:1fr 1fr; max-width:1480px\">\n      <div class=\"glass bar blu\"><span class=\"tag\">2011 · L'intuizione<\u002Fspan><p class=\"mt-s\">Una volontà precisa, in anticipo sui tempi: non solo denunciare l'abusivismo, ma costruire un metodo che produca atti.<\u002Fp><\u002Fdiv>\n      <div class=\"glass bar\"><span class=\"tag\">2013 · Le prime azioni strutturate<\u002Fspan><p class=\"mt-s\">Con l'avvocata Maddalena D'Aprile e la dottoressa Jacinta Bucchi prende forma la struttura legale e amministrativa.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"band fronte mt-m reveal wide\" style=\"--d:.34s; max-width:1480px\"><b>2014 — già sulla stampa nazionale.<\u002Fb> La nostra analisi su evasione e danno erariale. Dieci anni dopo, è ancora la base delle inchieste nazionali.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 · 2014 STAMPA -->\n  <section class=\"s cine\" data-label=\"2014 · Stampa\">\n    <div class=\"fullbleed\"><image-slot id=\"cine-stampa\" class=\"duotone kenburns\" placeholder=\"Foto: ritaglio di giornale / documenti protocollati / scrivania con atti\" fit=\"cover\"><\u002Fimage-slot><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"col gap-m\">\n      <div class=\"eyebrow reveal\"><span class=\"dot\"><\u002Fspan> 2014 · La stampa nazionale<\u002Fdiv>\n      <h2 class=\"heavy h1 reveal\" style=\"--d:.08s; max-width:18ch\">Quando ancora<br>non ci credeva nessuno,<br><span class=\"grad\">era già sui giornali.<\u002Fspan><\u002Fh2>\n      <p class=\"lead reveal\" style=\"--d:.2s\">Evasione fiscale e danno erariale degli NCC fantasma: un'analisi diventata, dieci anni dopo, la base delle inchieste nazionali.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 · 2017 LA TELEFONATA -->\n  <section class=\"s cine\" data-label=\"2017 · La telefonata\">\n    <div class=\"fullbleed\"><image-slot id=\"cine-call\" class=\"duotone kenburns\" placeholder=\"Foto evocativa: persona al telefono in penombra / cornetta / luce notturna\" fit=\"cover\"><\u002Fimage-slot><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"col gap-s\">\n      <h2 class=\"heavy giant rosso reveal\" style=\"font-size:200px\">2017<\u002Fh2>\n      <p class=\"sub reveal wide\" style=\"--d:.12s; max-width:40ch; font-size:30px; color:var(--ink)\">Una telefonata a uno dei maggiori rappresentanti della categoria. Messo in vivavoce e deriso davanti agli altri — perché insisteva sugli atti, sulle carte, sui protocolli.<\u002Fp>\n      <p class=\"heavy h2 korsiv c-rosso reveal\" style=\"--d:.24s\">“Allora si rideva.”<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"foot\">\n      <span class=\"frontbar\"><\u002Fspan>\n      <span class=\"meta\">Oggi i fatti hanno dato ragione al metodo. La storica cooperativa romana ha siglato l'accordo nazionale con Uber il <b style=\"color:var(--ink-dim)\">24 maggio 2022<\u002Fb>.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 · DUE MONDI -->\n  <section class=\"s\" data-label=\"Due mondi\" style=\"padding:0\">\n    <div class=\"split\">\n      <div class=\"world law\">\n        <div class=\"wk reveal-x\">Il sistema della legge<\u002Fdiv>\n        <div class=\"ring pulse reveal-x\" style=\"--d:.1s\"><\u002Fdiv>\n        <h3 class=\"heavy reveal-x\" style=\"--d:.16s\">Un cerchio<br>che si chiude.<\u002Fh3>\n        <ul class=\"col gap-s reveal-x\" style=\"--d:.24s; list-style:none; padding:0; margin:0\">\n          <li>Corte Costituzionale · Consiglio di Stato · TAR<\u002Fli>\n          <li>Atti, protocolli, diffide, esposti<\u002Fli>\n          <li>Coerente, preciso, verificabile — ogni grado conferma il precedente<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"world pol\">\n        <div class=\"wk reveal-x\" style=\"--d:.1s\">La politica<\u002Fdiv>\n        <svg class=\"wobble reveal-x\" style=\"--d:.16s\" viewBox=\"0 0 240 60\" fill=\"none\"><path d=\"M0 30 Q30 2 60 30 T120 30 T180 30 T240 30\" stroke=\"var(--ink-faint)\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <h3 class=\"heavy reveal-x\" style=\"--d:.2s\">Ondivaga,<br>oscillante.<\u002Fh3>\n        <ul class=\"col gap-s reveal-x\" style=\"--d:.28s; list-style:none; padding:0; margin:0\">\n          <li>Indirizzi che cambiano, segnali ambigui<\u002Fli>\n          <li>Spesso condizionata da convenienze contingenti<\u002Fli>\n          <li>Non sempre allineata all'interesse pubblico<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\" style=\"bottom:48px\"><span class=\"frontbar\"><\u002Fspan><span class=\"meta\">Senza diffamare nessuno: da una parte un sistema che si chiude, dall'altra un'oscillazione. I fatti, e gli atti, parlano.<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 · LA MACCHINA -->\n  <section class=\"s\" data-label=\"La macchina\">\n    <div class=\"eyebrow reveal\"><span class=\"dot\"><\u002Fspan> Non una protesta<\u002Fdiv>\n    <h2 class=\"heavy h1 reveal\" style=\"--d:.06s\">La macchina giuridica.<\u002Fh2>\n    <p class=\"sub reveal\" style=\"--d:.12s\">Ogni passaggio è un atto protocollato, opponibile, verificabile.<\u002Fp>\n    <div class=\"flow mt-l reveal\" style=\"- \"lab\">atti prodotti negli ultimi 5 mesi<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat reveal\" style=\"--d:.4s\"><div class=\"heavy num grad\">44<\u002Fdiv><div class=\"lab\">casi negli ultimi 6 mesi (definitivi + in corso)<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"band fronte mt-l reveal\" style=\"--d:.5s; max-width:1500px\">Nato dall'esperienza e cresciuto esponenzialmente a Firenze, oggi il metodo apre procedimenti anche in Lombardia: Como, Saronno, Trescore Cremasco. Ogni revoca è documentata caso per caso.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 · LE SENTENZE -->\n  <section class=\"s\" data-label=\"Le sentenze\">\n    <div class=\"eyebrow reveal\"><span class=\"dot\"><\u002Fspan> Il cerchio si chiude<\u002Fdiv>\n    <h2 class=\"heavy h1 reveal\" style=\"--d:.06s\">Le sentenze che contano.<\u002Fh2>\n    <div class=\"cards mt-l reveal\" style=\"--d:.16s; grid-template-columns:repeat(3,1fr)\">\n      <div class=\"glass bar blu\"><span class=\"tag\">Legittimazione attiva<\u002Fspan><div class=\"ttl mt-s\">CdS 9672/2023<\u002Fdiv><p>Il Consiglio di Stato riconosce a URITAXI il diritto di stare in giudizio per la categoria. Da soli no. Insieme sì.<\u002Fp><\u002Fdiv>\n      <div class=\"glass bar\"><span class=\"tag\">Vincolo territoriale<\u002Fspan><div class=\"ttl mt-s\">Corte Cost. 56/2020 · 163/2025<\u002Fdiv><p>La Consulta conferma che il vincolo è legittimo. I controlli sono “presidi adeguati”, non burocrazia.<\u002Fp><\u002Fdiv>\n      <div class=\"glass bar verde\"><span class=\"tag\">Le foto sono prova<\u002Fspan><div class=\"ttl mt-s\">TAR Toscana 263/2023 · 903/2026<\u002Fdiv><p>Il TAR indica alle associazioni le fotografie come prova dei veicoli NCC fuori territorio.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"sub korsiv mt-l reveal wide\" style=\"--d:.3s; max-width:none\">«...le associazioni potrebbero ricorrere a molti altri mezzi di prova, quali ad esempio delle fotografie...» — TAR Toscana 263/2023, pag. 4<\u002Fp>\n  < yebrow reveal\"><span class=\"dot\"><\u002Fspan> Proprio qui<\u002Fdiv>\n      <h2 class=\"heavy h1 reveal\" style=\"--d:.06s\">Uber è stata<br>fermata a Milano.<\u002Fh2>\n      <div class=\"cards mt-s reveal\" style=\"--d:.16s; grid-template-columns:1fr 1fr; max-width:1200px\">\n        <div class=\"glass bar\"><div class=\"ttl\">Trib. Milano 8359/2015<\u002Fdiv><p>UberPop bloccata: concorrenza sleale verso i taxi.<\u002Fp><\u002Fdiv>\n        <div class=\"glass bar blu\"><div class=\"ttl\">TAR Lombardia 860/2016<\u002Fdiv><p>Lo strumento tecnologico non cancella le regole del trasporto non di linea.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"lead reveal\" style=\"--d:.26s\">La legge è la stessa ovunque: <b class=\"c-blu\">L. 21/1992<\u002Fb>. Milano lo ha già dimostrato.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12 · FRONTE COMUNE -->\n  <section class=\"s\" data-label=\"Insieme sì\">\n    <div class=\"frontbar full reveal\" style=\"height:10px; max-width:none\"><\u002Fdiv>\n    <h2 class=\"heavy display mt-l reveal\" style=\"--d:.08s; font-size:128px\">Da soli no.<br><span class=\"grad\">Insieme sì.<\u002Fspan><\u002Fh2>\n    <p class=\"lead reveal\" style=\"--d:.18s\">CdS 9672/2023: il singolo tassista non è ammesso nemmeno al TAR. L'associazione sì.<\u002Fp>\n    <div class=\"cards mt-l reveal\" style=\"--d:.26s; grid-template-columns:repeat(3,1fr)\">\n      <div class=\"glass bar blu\"><div class=\"ttl\">Il metodo, subito<\u002Fdiv><p>Modelli collaudati dal 2012, pronti per Milano.<\u002Fp><\u002Fdiv>\n      <div class=\"glass bar\"><div class=\"ttl\">Una squadra rodata<\u002Fdiv><p>Non si parte da zero: quindici anni di esperienza.<\u002Fp><\u002Fdiv>\n      <div class=\"glass bar verde\"><div class=\"ttl\">Risultati misurabili<\u002Fdiv><p>Ogni caso ha protocollo, data, esito: si verifica, non si racconta.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"logostrip\"><span class=\"logoplate sm\"><img src= ">Il primo atto parte entro <b class=\"c-rosso\">15 giorni<\u002Fb>.<\u002Fp>\n        <p class=\"sub reveal\" style=\"--d:.24s\">Modulo di adesione in sala — la vostra presenza fa la differenza.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col center gap-s grow\" style=\"--d:.2s\">\n        <span class=\"logoplate\" style=\"padding:14px\"><img src=\"c4ecbd5c-c209-4d73-9b33-d00c66fdb478\" alt=\"QR\" style=\"width:272px;height:272px;display:block;image-rendering:pixelated\"><\u002Fspan>\n        <span class=\"meta\">Inquadra per aderire<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\"><span class=\"logostrip\"><span class=\"logoplate sm\"><img src=\"5caa17af-9c4f-4c7a-b28d-2f902692bdaa\" alt=\"URITAXI\"><\u002Fspan><span class=\"logoplate sm\"><img src=\"c08ca18a-9bc6-406d-b271-b032c0f7a639\" alt=\"FILT-CGIL Taxi\"><\u002Fspan><\u002Fspan><span class=\"frontbar\"><\u002Fspan><span class=\"fill\"><\u002Fspan><span class=\"meta\">FILT CGIL Taxi · Taxi Service Milano · UGL Taxi Milano · URITAXI Milano<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 · CLOSING -->\n  <section class=\"s cine center\" data-label=\"Chiusura\">\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"col center gap-m\">\n      <div class=\"frontbar reveal\"><\u002Fdiv>\n      <h2 class=\"heavy display reveal\" style=\"--d:.08s; font-size:120px\">Non una protesta.<\u002Fh2>\n      <h2 class=\"heavy display grad reveal\" style=\"--d:.18s; font-size:120px\">Una macchina già pronta.<\u002Fh2>\n      <p class=\"sub reveal\" style=\"--d:.3s; max-width:50ch\">Collaudata, verificabile, capace di produrre effetti reali. Il metodo esiste già: va usato, non reinventato.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"foot center\" style=\"justify-content:center\"><span class=\"logostrip\"><span class=\"logoplate sm\"><img src=\"5caa17af-9c4f-4c7a-b28d-2f902692bdaa\" alt=\"URITAXI\"><\u002Fspan><span class=\"logoplate sm\"><img src=\"c08ca18a-9bc6-406d-b271-b032c0f7a639\"  slides().length, n = activeIndex();\n      deck.goTo((n + 1) % total);\n    }, SECONDS * 1000);\n  }\n  function stop() { if (timer) clearInterval(timer); timer = null; document.body.removeAttribute('data-auto'); }\n  window.addEventListener('keydown', function (e) {\n    if (e.key === 'a' || e.key === 'A') { timer ? stop() : start(); }\n  });\n  // qualsiasi navigazione manuale ferma lo scorrimento automatico\n  ['mousedown', 'touchstart'].forEach(function (ev) {\n    window.addEventListener(ev, function () { /* lascia attivo: solo i tasti freccia non fermano */ }, { passive: true });\n  });\n  if ((location.hash || '').replace('#', '') === 'auto') {\n    if (deck && deck.goTo) start(); else window.addEventListener('load', start);\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
