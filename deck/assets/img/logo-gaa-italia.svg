<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f1f33"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Taxi icon stylized -->
  <g transform="translate(256, 180)">
    <!-- Car body -->
    <path d="M-120,80 L-100,20 L-60,0 L60,0 L100,20 L120,80 L120,120 L-120,120 Z" 
          fill="url(#gold)" stroke="#fff" stroke-width="4"/>
    <!-- Windows -->
    <path d="M-80,25 L-60,10 L60,10 L80,25 L70,60 L-70,60 Z" 
          fill="#1e3a5f" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="-70" cy="120" r="25" fill="#333" stroke="#fff" stroke-width="3"/>
    <circle cx="70" cy="120" r="25" fill="#333" stroke="#fff" stroke-width="3"/>
    <circle cx="-70" cy="120" r="12" fill="#666"/>
    <circle cx="70" cy="120" r="12" fill="#666"/>
    <!-- Taxi light -->
    <rect x="-25" y="-15" width="50" height="20" rx="5" fill="#fff"/>
    <text x="0" y="2" font-family="Arial" font-size="12" font-weight="bold" fill="#1e3a5f" text-anchor="middle">TAXI</text>
  </g>
  
  <!-- GAA Text -->
  <text x="256" y="380" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="#ffffff" text-anchor="middle">GAA</text>
  
  <!-- FIRENZE subtitle -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="8">ITALIA</text>
  
  <!-- Shield badge -->
  <g transform="translate(420, 80)">
    <path d="M0,-35 L30,0 L0,40 L-30,0 Z" fill="url(#gold)" stroke="#fff" stroke-width="2"/>
    <text x="0" y="8" font-family="Arial" font-size="20" font-weight="bold" fill="#1e3a5f" text-anchor="middle">✓</text>
  </g>
</svg>
