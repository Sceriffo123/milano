<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--nero); color: var(--panna); height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .mark { font-family: var(--font-heavy); font-weight: 900; letter-spacing: -.01em; font-size: 42px; line-height: 1; }
  .mark .dot { color: var(--rosso); }
  .sigle { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--grigio-su-scuro); text-align: center; max-width: 60ch; }
  .rule { width: 64px; height: 5px; background: var(--rosso); border-radius: 2px; }
</style>
</head>
<body>
  <div class="mark">URITAXI <span class="dot">·</span> FILT CGIL</div>
  <div class="rule"></div>
  <div class="sigle">FILT CGIL Taxi · Taxi Service Milano · UGL Taxi Milano · URITAXI Milano</div>
</body>
</html>
