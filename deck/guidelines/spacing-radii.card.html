<!-- @dsCard group="Spacing" viewport="700x170" name="Raggi & ombra" subtitle="Angoli minimi, istituzionali · ombra solenne" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--panna); color: var(--nero); padding: 24px 28px; display: flex; gap: 28px; align-items: center; height: 170px; }
  .tile { background: #fff; width: 130px; height: 86px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--grigio); box-shadow: inset 0 0 0 1px rgba(0,0,0,.1); }
  .t-chip { border-radius: var(--radius-chip); }
  .t-card { border-radius: var(--radius-card); }
  .t-pill { border-radius: var(--radius-pill); }
  .t-shadow { box-shadow: var(--shadow-card); border-radius: var(--radius-card); }
  .lbl { display: block; text-align: center; font-size: 11px; color: var(--grigio); margin-top: 8px; }
  .col { display: flex; flex-direction: column; }
</style>
</head>
<body>
  <div class="col"><div class="tile t-chip">3px</div><span class="lbl">--radius-chip</span></div>
  <div class="col"><div class="tile t-card">4px</div><span class="lbl">--radius-card</span></div>
  <div class="col"><div class="tile t-pill">20px</div><span class="lbl">--radius-pill</span></div>
  <div class="col"><div class="tile t-shadow">ombra</div><span class="lbl">--shadow-card</span></div>
</body>
</html>
