<!-- @dsCard group="Type" viewport="700x240" name="Corpo, sommario, servizio" subtitle="Archivo / Helvetica Neue — lead, sub, body" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--panna); color: var(--nero); padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
  .lead { font-size: 26px; line-height: 1.25; max-width: 30ch; }
  .sub { font-size: 18px; color: var(--grigio); max-width: 46ch; line-height: 1.3; }
  .body { font-size: 16px; line-height: 1.45; max-width: 56ch; }
  .body b { color: var(--rosso); }
  .lbl { font-size: 11px; color: var(--grigio); letter-spacing: .04em; }
</style>
</head>
<body>
  <div><span class="lbl">LEAD · --fs-lead</span><p class="lead corsivo">Il metodo Firenze: quindici anni di atti, risultati verificabili.</p></div>
  <div><span class="lbl">SUB · --fs-sub</span><p class="sub">Ogni passaggio è un atto protocollato, opponibile, verificabile.</p></div>
  <div><span class="lbl">BODY · --fs-body</span><p class="body"><b>Protocolli, PEC, giurisprudenza.</b> Non proteste. Se il Comune non agisce, ogni atto diventa la base del successivo.</p></div>
</body>
</html>
