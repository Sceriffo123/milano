<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--panna); color: var(--nero); padding: 22px 28px; display: flex; align-items: center; gap: 40px; height: 210px; }
  .giant { font-family: var(--font-heavy); font-weight: 900; color: var(--rosso); font-size: 150px; line-height: .85; letter-spacing: -.01em; }
  .stat { display: flex; flex-direction: column; gap: 4px; }
  .counter { font-family: var(--font-heavy); font-weight: 900; color: var(--rosso); font-size: 92px; line-height: .9; }
  .clab { font-size: 14px; color: var(--grigio); max-width: 16ch; }
</style>
</head>
<body>
  <div class="giant">2011</div>
  <div class="stat">
    <div class="counter">15</div>
    <div class="clab">anni di attività continuativa (2011–2026)</div>
  </div>
</body>
</html>
