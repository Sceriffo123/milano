<!-- @dsCard group="Colors" viewport="700x190" name="Palette di marca" subtitle="Nero · Rosso taxi · Panna · Bianco — obbligatoria" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--panna); }
  .wrap { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .sw { height: 190px; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; }
  .sw .name { font-family: var(--font-heavy); font-size: 14px; letter-spacing: -.01em; }
  .sw .hex { font-size: 12px; opacity: .8; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .on-dark { color: var(--panna); }
  .on-light { color: var(--nero); }
  .border { box-shadow: inset 0 0 0 1px rgba(0,0,0,.1); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw on-dark" style="background: var(--nero);"><div class="name">Nero</div><div class="hex">#1A1A1A</div></div>
    <div class="sw on-dark" style="background: var(--rosso);"><div class="name">Rosso taxi</div><div class="hex">#C8102E</div></div>
    <div class="sw on-light" style="background: var(--panna);"><div class="name">Panna</div><div class="hex">#F7F5F2</div></div>
    <div class="sw on-light border" style="background: var(--bianco);"><div class="name">Bianco</div><div class="hex">#FFFFFF</div></div>
  </div>
</body>
</html>
