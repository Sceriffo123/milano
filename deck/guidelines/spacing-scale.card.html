<!-- @dsCard group="Spacing" viewport="700x160" name="Scala di spazio" subtitle="Passo 4/8 — da 4px a 64px" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--panna); color: var(--nero); padding: 24px 28px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--rosso); width: 22px; border-radius: 2px; }
  .lbl { font-size: 11px; color: var(--grigio); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="bar" style="height: var(--space-1);"></div><div class="lbl">4</div></div>
    <div class="cell"><div class="bar" style="height: var(--space-2);"></div><div class="lbl">8</div></div>
    <div class="cell"><div class="bar" style="height: var(--space-3);"></div><div class="lbl">12</div></div>
    <div class="cell"><div class="bar" style="height: var(--space-4);"></div><div class="lbl">16</div></div>
    <div class="cell"><div class="bar" style="height: var(--space-5);"></div><div class="lbl">24</div></div>
    <div class="cell"><div class="bar" style="height: var(--space-6);"></div><div class="lbl">32</div></div>
    <div class="cell"><div class="bar" style="height: var(--space-7);"></div><div class="lbl">48</div></div>
    <div class="cell"><div class="bar" style="height: var(--space-8);"></div><div class="lbl">64</div></div>
  </div>
</body>
</html>
