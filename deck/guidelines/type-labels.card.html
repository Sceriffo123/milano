<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--panna); color: var(--nero); padding: 26px 28px; display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }
  .kicker { color: var(--rosso); font-weight: 700; letter-spacing: .18em; text-transform: uppercase; font-size: 14px; }
  .chip { display: inline-block; background: var(--rosso); color: #fff; font-weight: 700; padding: .5em 1em; border-radius: 3px; letter-spacing: .12em; font-size: 13px; }
</style>
</head>
<body>
  <div class="kicker">Milano · 10 giugno 2026 · Spazio Kolbe</div>
  <span class="chip">LA PROPOSTA, OGGI</span>
</body>
</html>
