<!-- @dsCard group="Colors" viewport="700x230" name="Scene scure e chiare" subtitle="Scuro per i momenti emotivi · chiaro per i contenuti" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; height: 230px; }
  .scene { padding: 22px 26px; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
  .scene .k { color: var(--rosso); font-weight: 700; letter-spacing: .18em; text-transform: uppercase; font-size: 11px; }
  .scene h3 { font-family: var(--font-heavy); letter-spacing: -.01em; font-size: 30px; line-height: .95; margin: 0; }
  .scene p { font-size: 13px; margin: 0; max-width: 28ch; }
  .dark { background: var(--nero); color: var(--panna); }
  .dark p { color: var(--grigio-su-scuro); }
  .light { background: var(--panna); color: var(--nero); }
  .light p { color: var(--grigio); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="scene dark">
      <div class="k">Scena scura</div>
      <h3>“Si rideva.”</h3>
      <p>Per i momenti emotivi e di racconto. Testo panna su nero.</p>
    </div>
    <div class="scene light">
      <div class="k">Scena chiara</div>
      <h3>I numeri</h3>
      <p>Per i contenuti verificabili: dati, sentenze, registri. Testo nero su panna.</p>
    </div>
  </div>
</body>
</html>
